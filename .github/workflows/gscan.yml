name: GScan Theme Check

on:
  # only allow pull_request
  #push:
  #  branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gscan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install gscan
        run: npm install -g gscan

      - name: Run gscan
        run: |
          gscan . --fatal
